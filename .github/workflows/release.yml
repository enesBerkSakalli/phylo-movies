name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
            build_target: mac
            build_arch: arm64
          - os: macos-15-intel
            platform: darwin-x64
            build_target: mac
            build_arch: x64
          - os: windows-latest
            platform: win32
            build_target: win
            build_arch: x64
          - os: ubuntu-latest
            platform: linux
            build_target: linux
            build_arch: x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v5
        with:
          path: |
            engine/BranchArchitect/.venv
            ~/.cache/pypoetry
          key: ${{ runner.os }}-${{ matrix.platform }}-poetry-${{ hashFiles('engine/BranchArchitect/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-poetry-

      - name: Install C compiler (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build FastTree from source
        shell: bash
        run: |
          cd engine/BranchArchitect
          chmod +x scripts/build_fasttree.sh
          ./scripts/build_fasttree.sh build
          ./scripts/build_fasttree.sh --check

      - name: Install Root Dependencies
        run: npm ci

      - name: Check version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Checking package versions against $VERSION (from tag $GITHUB_REF_NAME)"
          npm run version:check -- "$VERSION"

      - name: Install Electron App Dependencies
        run: |
          cd electron-app
          npm ci

      - name: Install Python Backend Dependencies
        shell: bash
        run: |
          cd engine/BranchArchitect
          poetry install --with build

      - name: Build and Publish
        shell: bash
        run: |
          cd electron-app
          if [ "${{ matrix.build_target }}" = "mac" ]; then
            bash build.sh mac --${{ matrix.build_arch }} -p always
          else
            bash build.sh ${{ matrix.build_target }} -p always
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS: ad-hoc signing is configured via identity:"-" in package.json.
          # These artifacts are unsigned convenience builds; reviewer guidance
          # recommends source or Docker for the supported macOS path.
          # To add Developer ID signing and notarization later, add these secrets:
          #   CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          # and change mac.identity in electron-app/package.json from "-" to null.
