<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Phylo-Movies abstract split mark</title>
  <desc id="desc">A restrained geometric split symbol with an offset frame, representing changing phylogenetic tree topology across time.</desc>
  <defs>
    <filter id="soft-shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="26" y="26" width="188" height="188" rx="42" fill="#f8fafc" filter="url(#soft-shadow)"/>
  <rect x="26" y="26" width="188" height="188" rx="42" stroke="#e2e8f0" stroke-width="4"/>

  <!-- Previous tree frame -->
  <g opacity="0.38" stroke="#64748b" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <path d="M80 160 L120 120"/>
    <path d="M120 120 L120 75"/>
    <path d="M120 120 L164 91"/>
    <path d="M120 120 L169 151"/>
  </g>
  <g opacity="0.38" fill="#64748b">
    <circle cx="80" cy="160" r="10"/>
    <circle cx="120" cy="75" r="10"/>
    <circle cx="164" cy="91" r="10"/>
    <circle cx="169" cy="151" r="10"/>
  </g>

  <!-- Current tree frame -->
  <g stroke="#0f172a" stroke-width="15" stroke-linecap="round" stroke-linejoin="round">
    <path d="M70 146 L116 120"/>
    <path d="M116 120 L87 82"/>
    <path d="M116 120 L157 76"/>
  </g>
  <path d="M116 120 L166 154" stroke="#0891b2" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Motion cue -->
  <path d="M145 137 C155 132 164 125 171 115" stroke="#0891b2" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <path d="M169 116 L172 101 L158 107" stroke="#0891b2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Nodes -->
  <circle cx="116" cy="120" r="17" fill="#0f172a"/>
  <circle cx="70" cy="146" r="13" fill="#0f172a"/>
  <circle cx="87" cy="82" r="13" fill="#0f172a"/>
  <circle cx="157" cy="76" r="13" fill="#0f172a"/>
  <circle cx="166" cy="154" r="14" fill="#0891b2"/>
</svg>
