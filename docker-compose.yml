# ==============================================================================
#  Phylo-Movies — Docker Compose
#
#  Production (single container):
#    docker compose up --build
#    → http://localhost:8080
#
#  Development backend only (use with `npm run dev` on the host):
#    docker compose up --build backend-dev
#    → Frontend: http://localhost:5173  (Vite HMR)
#    → Backend:  http://localhost:5002  (Flask)
# ==============================================================================

services:
  # ── Production: combined frontend + backend ────────────────────────────────
  app:
    build: .
    init: true
    ports:
      - '8080:8080'
    environment:
      LOG_FORMAT: json
      LOG_ACCESS: '1'
      LOG_HEALTHCHECKS: '0'
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Development: backend only (use with `npm run dev` on host) ─────────────
  backend-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    init: true
    ports:
      - '5002:5002'
    volumes:
      - ./engine/BranchArchitect:/app/engine/BranchArchitect
    environment:
      LOG_FORMAT: json
      LOG_ACCESS: '1'
      LOG_HEALTHCHECKS: '0'
    profiles:
      - dev
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5002/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Publication data regeneration: conda/bioconda toolchain ───────────────
  publication-env:
    build:
      context: .
      dockerfile: docker/Dockerfile.publication
    volumes:
      - .:/workspace
    working_dir: /workspace
    profiles:
      - publication
    environment:
      PHYLOMOVIES_PUBLICATION_ENV: phylomovies-publication
